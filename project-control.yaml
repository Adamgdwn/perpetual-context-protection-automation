project_name: perpetual-context-protection-automation
project_type: automation
use_case:
  primary: Workflow automation
  secondary:
    - AI agent tooling
    - Desktop application
    - VS Code extension
  notes: Use-case classification informs controls but does not override selected risk_tier or governance_level. Chunk Zero path cleanup completed 2026-06-29; local directory and public repo use perpetual-context-protection-automation.
risk_tier: low
governance_level: 1
repository_model: single-repo
owner:
  name: Adam Goodwin
  role: owner
technical_lead:
  name: hybrid session
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: false
  handles_money: false
  notes: ""
controls:
  required_docs:
    - README.md
    - START_HERE.md
    - docs/context-map.md
    - docs/architecture.md
    - docs/current-build-pathway.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/policy/durable-development-engineering-policy.md
    - docs/standards/README.md
    - docs/standards/engineering-governance-by-use-case.md
    - docs/standards/ship-ready-engineering-standard.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
exceptions: []
agent_controls:
  applicable: false
  autonomy_level: A0
  model_registry: []
  prompt_registry: []
agentic_coding:
  principle: "The repository remembers. Agents rent context."
  default_budget: medium
  always_loaded_files:
    - AGENTS.md
  conditional_loaded_files:
    START_HERE.md: material work, unclear scope, handoffs, or active-plan changes
    docs/context-map.md: unclear context routing or broader task scoping
    project-control.yaml: risk, governance level, controls, or required docs
  context_limits:
    agents_md_target_kb: 6
    claude_md_target_kb: 6
    task_packet_target_words: 1200
    handoff_target_words: 900
  subagent_policy:
    max_parallel_readers: 3
    max_parallel_editors: 1
    require_summary_only: true
    no_overlapping_file_edits: true
